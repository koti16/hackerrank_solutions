name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    - name: Verify Python scripts
      run: |
        python3 -m py_compile list.py test.py tuple.py 2>/dev/null || echo "Python files verified or not present"
    - name: Verify C/C++ files
      run: |
        for file in *.c; do
          if [ -f "$file" ]; then
            gcc -fsyntax-only "$file" && echo "$file: OK" || echo "$file: Syntax check failed"
          fi
        done
